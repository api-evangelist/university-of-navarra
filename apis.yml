aid: university-of-navarra
name: University of Navarra
description: >-
  The University of Navarra (Universidad de Navarra) is a private research
  university founded in 1952, headquartered in Pamplona, Spain, with additional
  campuses in San Sebastian and Madrid. It is ranked #249 in the QS World
  University Rankings 2025. Its public, machine-consumable developer footprint
  is limited: the principal documented interface is DADUN (Deposito Academico
  Digital de la Universidad de Navarra), the institutional open-access repository
  running on DSpace, which exposes metadata harvesting through the OAI-PMH
  protocol. No general-purpose public developer portal, open-data API platform,
  or official GitHub organization could be independently confirmed for the
  institution at the time of review.
