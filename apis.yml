    name: DADUN Institutional Repository (OAI-PMH)
    description: >-
      DADUN (Deposito Academico Digital de la Universidad de Navarra) is the
      university's open-access institutional repository, built on DSpace
      (reported version 5.3). It exposes a standard OAI-PMH 2.0 interface for
      harvesting Dublin Core and other metadata covering academic deposits,
      doctoral theses, teaching materials, institutional publications and
      university journals. The repository is registered in ROAR, Hispana and
      REBIUN. Note: at the time of review the public site sits behind a bot
      protection layer (Anubis) that returns HTTP 403 to automated clients.
