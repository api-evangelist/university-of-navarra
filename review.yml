  - date: '2026-06-03'
    rating: 2
    summary: >-
      The University of Navarra (Universidad de Navarra), a private Spanish
      research university ranked QS World 2025 #249, exposes a limited public
      API footprint. The only documented machine-consumable interface confirmed
      is DADUN, its DSpace-based open-access institutional repository, which
      provides an OAI-PMH metadata harvesting endpoint registered in ROAR,
      Hispana and REBIUN. No general developer portal, open-data API platform,
      documented SIS/catalog/timetable API, or official GitHub organization
      could be independently verified. The library discovery tool (Unika) and
      official websites exist but expose no documented public API. The
      dadun.unav.edu host returned HTTP 403 to automated probes during review
      (Anubis bot protection), and LinkedIn returned 999 (standard bot block);
      both are documented/known-good resources rather than dead links. No
      endpoints were fabricated.
